<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเบิกพัสดุ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- กำหนด Theme สีตามที่ออกแบบ -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(84, 88, 89)',
                        highlight: 'rgb(255, 209, 0)',
                        dark: 'rgb(16, 24, 32)'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .hide { display: none !important; }
        
        /* ซ่อนลูกศรขึ้นลงในช่อง input number */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }

        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ (สำหรับแท็บหมวดหมู่และ Dropdown) */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-dark bg-gray-100 min-h-screen pb-20">

    <!-- Navbar -->
    <nav class="bg-dark text-highlight p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div class="font-bold text-lg flex items-center gap-2">
            📦 ระบบเบิกพัสดุ
        </div>
        <div id="userInfo" class="flex items-center gap-2 hide">
            <span id="userName" class="text-sm font-semibold text-white"></span>
            <img id="userImg" src="" class="w-8 h-8 rounded-full border border-highlight object-cover">
            <button id="adminBtn" onclick="toggleAdminMode()" class="hide ml-2 bg-primary text-white text-xs px-2 py-1 rounded">Admin</button>
        </div>
    </nav>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-dark/80 flex flex-col justify-center items-center z-[100] text-highlight">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-highlight mb-4"></div>
        <p class="font-bold">กำลังโหลดข้อมูล...</p>
    </div>

    <!-- User View (Dashboard) -->
    <main id="userView" class="p-4 max-w-4xl mx-auto hide">
        <div class="flex justify-between items-end mb-4 border-b-2 border-highlight pb-1">
            <h2 class="text-xl font-bold text-primary">รายการพัสดุ</h2>
        </div>

        <div class="mb-5 space-y-3 sticky top-[60px] z-40 bg-gray-100 pt-2 pb-2">
            <!-- Search Bar -->
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="handleSearch(this.value)" placeholder="ค้นหาชื่อ หรือ รหัสพัสดุ..." 
                    class="w-full pl-10 pr-4 py-2.5 border-none rounded-xl bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-highlight text-sm font-semibold">
                <span class="absolute left-3 top-2.5 text-xl">🔍</span>
            </div>
            <!-- Category Tabs -->
            <div id="categoryTabs" class="flex overflow-x-auto gap-2 pb-1 scrollbar-hide snap-x">
                <!-- แท็บจะถูกสร้างอัตโนมัติด้วย JavaScript -->
            </div>
        </div>

        <!-- ตารางแสดงพัสดุ -->
        <div id="itemList" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </main>

    <!-- Cart Summary Bottom Bar -->
    <div id="cartBar" class="fixed bottom-0 left-0 w-full bg-primary text-white p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] flex justify-between items-center z-40 rounded-t-2xl hide">
        <div>
            <span class="text-sm">เลือกแล้ว:</span>
            <span id="cartCount" class="font-bold text-highlight text-lg ml-1">0</span> รายการ
        </div>
        <button onclick="showCartSummary()" class="bg-highlight text-dark font-bold px-6 py-2 rounded-full hover:bg-yellow-400 transition transform hover:scale-105 shadow-lg">
            ยืนยันการเบิก
        </button>
    </div>

    <!-- Admin View -->
    <main id="adminView" class="hide p-4 max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-primary border-b-2 border-highlight inline-block pb-1">โหมดผู้ดูแลระบบ</h2>
            <button onclick="toggleAdminMode()" class="bg-gray-200 text-dark px-3 py-1 rounded text-sm font-bold shadow hover:bg-gray-300 transition">กลับหน้าแรก</button>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- Add Stock Form (เปลี่ยนเป็นระบบ Custom Dropdown) -->
            <div class="bg-white p-5 rounded-2xl shadow">
                <h3 class="font-bold text-lg mb-4 text-dark flex items-center gap-2">➕ นำเข้าพัสดุ (Add/Update)</h3>
                <form id="addStockForm" onsubmit="handleAddStock(event)" class="space-y-4">
                    
                    <div class="relative">
                        <label class="text-sm text-gray-600 block mb-1">รหัสพัสดุ (ItemID)</label>
                        <input type="text" id="add_itemId" required class="w-full border border-gray-300 p-2 rounded bg-gray-50 focus:outline-none focus:ring-2 focus:ring-highlight focus:bg-white transition" 
                            placeholder="พิมพ์เพื่อค้นหา หรือเพิ่มรหัสใหม่" autocomplete="off"
                            onfocus="showCustomDropdown('add_itemId')" onblur="hideCustomDropdown('add_itemId')" oninput="filterCustomDropdown('add_itemId')">
                        <!-- Custom Dropdown List -->
                        <ul id="dropdown_add_itemId" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-xl max-h-48 overflow-y-auto hide mt-1 divide-y divide-gray-100 scrollbar-hide"></ul>
                        <div id="currentStockHint" class="text-xs text-blue-600 mt-1.5 font-semibold hide"></div>
                    </div>

                    <div class="relative">
                        <label class="text-sm text-gray-600 block mb-1">ชื่อพัสดุ</label>
                        <input type="text" id="add_itemName" required class="w-full border border-gray-300 p-2 rounded bg-gray-50 focus:outline-none focus:ring-2 focus:ring-highlight focus:bg-white transition" 
                            placeholder="พิมพ์เพื่อค้นหา หรือเพิ่มชื่อใหม่" autocomplete="off"
                            onfocus="showCustomDropdown('add_itemName')" onblur="hideCustomDropdown('add_itemName')" oninput="filterCustomDropdown('add_itemName')">
                        <ul id="dropdown_add_itemName" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-xl max-h-48 overflow-y-auto hide mt-1 divide-y divide-gray-100 scrollbar-hide"></ul>
                    </div>

                    <div class="relative">
                        <label class="text-sm text-gray-600 block mb-1">หมวดหมู่ (Category)</label>
                        <input type="text" id="add_category" class="w-full border border-gray-300 p-2 rounded bg-gray-50 focus:outline-none focus:ring-2 focus:ring-highlight focus:bg-white transition" 
                            placeholder="เช่น อุปกรณ์ไอที, เครื่องเขียน" autocomplete="off"
                            onfocus="showCustomDropdown('add_category')" onblur="hideCustomDropdown('add_category')" oninput="filterCustomDropdown('add_category')">
                        <ul id="dropdown_add_category" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-xl max-h-40 overflow-y-auto hide mt-1 divide-y divide-gray-100 scrollbar-hide"></ul>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-sm text-gray-600 block mb-1">จำนวนที่นำเข้า</label>
                            <input type="number" id="add_qty" required class="w-full border border-gray-300 p-2 rounded bg-gray-50 focus:outline-none focus:ring-2 focus:ring-highlight" min="1">
                        </div>
                        <div class="relative">
                            <label class="text-sm text-gray-600 block mb-1">หน่วยนับ</label>
                            <input type="text" id="add_unit" required class="w-full border border-gray-300 p-2 rounded bg-gray-50 focus:outline-none focus:ring-2 focus:ring-highlight" 
                                autocomplete="off" placeholder="เช่น ชิ้น, กล่อง"
                                onfocus="showCustomDropdown('add_unit')" onblur="hideCustomDropdown('add_unit')" oninput="filterCustomDropdown('add_unit')">
                            <ul id="dropdown_add_unit" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-xl max-h-40 overflow-y-auto hide mt-1 divide-y divide-gray-100 scrollbar-hide"></ul>
                        </div>
                    </div>

                    <div>
                        <label class="text-sm text-gray-600 block mb-1">จุดแจ้งเตือนใกล้หมด (Minimum)</label>
                        <input type="number" id="add_min" class="w-full border border-gray-300 p-2 rounded bg-gray-50 focus:outline-none focus:ring-2 focus:ring-highlight" min="0">
                    </div>

                    <div class="flex gap-2 mt-4">
                        <button type="button" onclick="clearAddStockForm()" class="w-1/3 bg-gray-200 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-300 transition shadow-sm">ล้างข้อมูล</button>
                        <button type="submit" class="w-2/3 bg-dark text-highlight font-bold py-3 rounded-lg hover:bg-black transition shadow-md">บันทึกนำเข้าสต็อก</button>
                    </div>
                </form>
            </div>

            <!-- Low Stock & Reports -->
            <div class="space-y-6">
                <!-- Low Stock Alert -->
                <div class="bg-red-50 border border-red-200 p-5 rounded-2xl shadow">
                    <h3 class="font-bold text-lg mb-3 text-red-700 flex items-center gap-2">⚠️ แจ้งเตือนพัสดุใกล้หมด</h3>
                    <div id="lowStockList" class="space-y-2 max-h-40 overflow-y-auto pr-2 scrollbar-hide">
                        <!-- Low stock items will show here -->
                    </div>
                </div>

                <!-- Report Section -->
                <div class="bg-white p-5 rounded-2xl shadow">
                    <h3 class="font-bold text-lg mb-3 text-dark">📊 สรุปยอดคงเหลือ</h3>
                    <button onclick="exportReportToPDF()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-700 transition shadow">
                        ดาวน์โหลดรายงาน (PDF)
                    </button>
                </div>
            </div>
        </div>

        <!-- Hidden Report Template for PDF Export -->
        <div class="hide">
            <!-- 🛠️ ปรับความกว้างให้พอดีหน้ากระดาษ A4 (190mm) และบังคับไม่ให้ตารางล้นขอบ -->
            <div id="reportContainer" class="p-8 bg-white text-black mx-auto" style="width: 190mm;">
                <h1 class="text-2xl font-bold text-center mb-6">รายงานสรุปยอดพัสดุคงเหลือ (Inventory Report)</h1>
                <table class="w-full text-left border-collapse border border-gray-300 table-fixed break-words">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="border border-gray-300 p-2 w-2/12">รหัส</th>
                            <th class="border border-gray-300 p-2 w-3/12">หมวดหมู่</th>
                            <th class="border border-gray-300 p-2 w-4/12">รายการพัสดุ</th>
                            <th class="border border-gray-300 p-2 w-2/12 text-center">คงเหลือ</th>
                            <th class="border border-gray-300 p-2 w-1/12 text-center">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // ==========================================
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyqxc4Bf1PkIhnkf9w_BH2gVipOBrI5nDKpLcU6IHVfaAZCyRTxc_qQphJRw3bBdQ8/exec'; // ⚠️ วาง URL GAS ของคุณ
        const LIFF_ID = '2010045466-Z0Gl17Wk'; // ⚠️ วาง LIFF ID ของคุณ
        // ==========================================
        
        let inventoryItems = [];
        let cart = {};
        let currentUser = null;
        let userRole = 'User';
        let currentCategory = 'ทั้งหมด';
        let searchQuery = '';

        window.onload = function() {
            if(LIFF_ID && !LIFF_ID.includes('ใส่_')) {
                initializeLiff();
            } else {
                mockLogin(); 
            }
        };

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    currentUser = {
                        userId: profile.userId,
                        displayName: profile.displayName,
                        pictureUrl: profile.pictureUrl
                    };
                    updateProfileUI();
                    await authWithBackend();
                }
            } catch (err) {
                console.error('LIFF Initialization failed', err);
                mockLogin();
            }
        }

        async function mockLogin() {
            currentUser = { userId: 'U12345', displayName: 'Mock User', pictureUrl: 'https://placehold.co/100x100/545859/FFD100?text=U' };
            updateProfileUI();
            await authWithBackend();
        }

        function updateProfileUI() {
            document.getElementById('userInfo').classList.remove('hide');
            document.getElementById('userName').textContent = currentUser.displayName;
            document.getElementById('userImg').src = currentUser.pictureUrl;
        }

        async function authWithBackend() {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'login', user: currentUser })
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    userRole = data.role;
                    if (userRole === 'Admin') {
                        document.getElementById('adminBtn').classList.remove('hide');
                    }
                    await loadItems();
                } else {
                    showError('ไม่สามารถเข้าสู่ระบบฐานข้อมูลได้');
                }
            } catch (error) {
                showError('การเชื่อมต่อเซิร์ฟเวอร์ล้มเหลว');
            }
        }

        async function loadItems() {
            document.getElementById('loading').classList.remove('hide');
            try {
                const response = await fetch(`${GAS_URL}?action=getItems`);
                const result = await response.json();
                
                if (result.status === 'success') {
                    inventoryItems = result.data;
                    renderCategoryTabs();
                    renderItems();
                    renderReportTable();
                    document.getElementById('loading').classList.add('hide');
                    document.getElementById('userView').classList.remove('hide');
                    if(Object.keys(cart).length > 0) document.getElementById('cartBar').classList.remove('hide');
                }
            } catch (error) {
                document.getElementById('loading').classList.add('hide');
                showError('ไม่สามารถโหลดข้อมูลพัสดุได้');
            }
        }

        // ==========================================
        // 🌟 ระบบ Custom Dropdown / Auto-complete (แก้ปัญหา iOS Datalist)
        // ==========================================
        function getDropdownData(fieldId) {
            if (fieldId === 'add_itemId') return inventoryItems.map(i => i.itemId);
            if (fieldId === 'add_itemName') return inventoryItems.map(i => i.itemName);
            if (fieldId === 'add_category') return [...new Set(inventoryItems.map(i => i.category).filter(Boolean))];
            if (fieldId === 'add_unit') return [...new Set(inventoryItems.map(i => i.unit).filter(Boolean))];
            return [];
        }

        function renderDropdown(fieldId, filterText = '') {
            const ul = document.getElementById(`dropdown_${fieldId}`);
            if (!ul) return;

            let data = getDropdownData(fieldId);
            
            // กรองข้อมูลตามที่พิมพ์
            if (filterText) {
                data = data.filter(item => String(item).toLowerCase().includes(String(filterText).toLowerCase()));
            }

            // จำกัดการแสดงผลแค่ 15 รายการเพื่อไม่ให้เมนูยาวเกินไป
            data = data.slice(0, 15);

            if (data.length === 0) {
                ul.classList.add('hide');
                return;
            }

            // ใช้ onmousedown แทน onclick เพราะมันทำงานเร็วกว่า onblur ของ input ทำให้ไม่บั๊กบนมือถือ
            ul.innerHTML = data.map(item => `
                <li class="px-3 py-2.5 cursor-pointer hover:bg-gray-100 text-sm truncate text-gray-800 transition-colors" 
                    onmousedown="selectDropdownItem('${fieldId}', '${String(item).replace(/'/g, "\\'")}')">
                    ${item}
                </li>
            `).join('');
            ul.classList.remove('hide');
        }

        function showCustomDropdown(fieldId) {
            const input = document.getElementById(fieldId);
            renderDropdown(fieldId, input.value); // แสดงรายการทั้งหมด หรือกรองตามค่าที่มีอยู่
        }

        function hideCustomDropdown(fieldId) {
            const ul = document.getElementById(`dropdown_${fieldId}`);
            if (ul) ul.classList.add('hide');
        }

        function filterCustomDropdown(fieldId) {
            const input = document.getElementById(fieldId);
            renderDropdown(fieldId, input.value);
            // ให้ Auto-fill ทำงานทันทีตอนพิมพ์ด้วย เผื่อพิมพ์จนเจอคำเป๊ะๆ
            if (fieldId === 'add_itemId' || fieldId === 'add_itemName') {
                autoFillItemInfo(fieldId === 'add_itemId' ? 'id' : 'name');
            }
        }

        function selectDropdownItem(fieldId, value) {
            const input = document.getElementById(fieldId);
            input.value = value;
            hideCustomDropdown(fieldId);
            
            // หลังจากกดเลือก ให้ดึงข้อมูลมาเติมช่องอื่นให้ครบ
            if (fieldId === 'add_itemId' || fieldId === 'add_itemName') {
                autoFillItemInfo(fieldId === 'add_itemId' ? 'id' : 'name');
            }
        }

        // 🌟 ฟังก์ชันล้างข้อมูลฟอร์ม
        function clearAddStockForm() {
            document.getElementById('addStockForm').reset();
            document.getElementById('currentStockHint').classList.add('hide');
        }

        // 🌟 ฟังก์ชันเมื่อคลิกรายการพัสดุใกล้หมด
        function fillStockFromLowStock(itemId) {
            document.getElementById('add_itemId').value = itemId;
            autoFillItemInfo('id');
            document.getElementById('add_qty').focus(); // โฟกัสไปที่ช่องกรอกจำนวน
            window.scrollTo({ top: 0, behavior: 'smooth' }); // เลื่อนหน้าจอกลับไปด้านบน
        }

        // 🌟 ฟังก์ชันเติมข้อมูลอัตโนมัติ (Auto-fill)
        function autoFillItemInfo(trigger) {
            let selectedItem = null;
            const itemIdInput = document.getElementById('add_itemId').value.trim();
            const itemNameInput = document.getElementById('add_itemName').value.trim();

            if (trigger === 'id' && itemIdInput) {
                selectedItem = inventoryItems.find(i => String(i.itemId) === itemIdInput);
            } else if (trigger === 'name' && itemNameInput) {
                selectedItem = inventoryItems.find(i => String(i.itemName) === itemNameInput);
            }

            const stockHint = document.getElementById('currentStockHint');

            if (selectedItem) {
                document.getElementById('add_itemId').value = selectedItem.itemId;
                document.getElementById('add_itemName').value = selectedItem.itemName;
                document.getElementById('add_category').value = selectedItem.category || '';
                document.getElementById('add_unit').value = selectedItem.unit || '';
                document.getElementById('add_min').value = selectedItem.minimumStock || '';
                
                stockHint.textContent = `✅ มีในระบบ: คงเหลือ ${selectedItem.stockQuantity} ${selectedItem.unit}`;
                stockHint.classList.remove('hide', 'text-yellow-600');
                stockHint.classList.add('text-blue-600');
            } else if (itemIdInput || itemNameInput) {
                stockHint.textContent = `✨ สร้างพัสดุรายการใหม่`;
                stockHint.classList.remove('hide', 'text-blue-600');
                stockHint.classList.add('text-yellow-600');
            } else {
                stockHint.classList.add('hide');
            }
        }
        // ==========================================

        function renderCategoryTabs() {
            const tabsContainer = document.getElementById('categoryTabs');
            const uniqueCategories = [...new Set(inventoryItems.map(item => item.category ? item.category.trim() : 'ทั่วไป'))];
            const allCategories = ['ทั้งหมด', ...uniqueCategories.filter(c => c !== '')];

            tabsContainer.innerHTML = allCategories.map(cat => {
                const isActive = currentCategory === cat;
                return `
                    <button onclick="setCategory('${cat}')" 
                        class="snap-start px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-200 shadow-sm
                        ${isActive ? 'bg-dark text-highlight scale-105' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-100'}">
                        ${cat}
                    </button>
                `;
            }).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategoryTabs();
            renderItems();
        }

        function handleSearch(query) {
            searchQuery = query.toLowerCase().trim();
            renderItems();
        }

        function renderItems() {
            const container = document.getElementById('itemList');
            container.innerHTML = '';

            const filteredItems = inventoryItems.filter(item => {
                const itemCat = item.category ? item.category.trim() : 'ทั่วไป';
                const matchCategory = (currentCategory === 'ทั้งหมด') || (itemCat === currentCategory);
                const matchSearch = String(item.itemName).toLowerCase().includes(searchQuery) || 
                                    String(item.itemId).toLowerCase().includes(searchQuery);
                return matchCategory && matchSearch;
            });

            if (filteredItems.length === 0) {
                container.innerHTML = `
                    <div class="col-span-2 md:col-span-4 text-center text-gray-500 py-10 bg-white rounded-2xl shadow-sm border border-dashed border-gray-300">
                        <div class="text-4xl mb-2">🔍</div>
                        <div class="font-bold">ไม่พบพัสดุ</div>
                        <div class="text-sm">ลองค้นหาด้วยคำอื่น หรือเลือกหมวดหมู่ใหม่</div>
                    </div>`;
                return;
            }

            filteredItems.forEach(item => {
                const qtyInCart = cart[item.itemId] || 0;
                const isOutOfStock = item.stockQuantity <= 0;

                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl shadow p-3 flex flex-col transition-opacity ${isOutOfStock ? 'opacity-60 grayscale' : ''}`;
                card.innerHTML = `
                    <div class="relative aspect-square bg-gray-200 rounded-xl mb-2 overflow-hidden flex items-center justify-center">
                        <img src="${item.imageUrl}" onerror="this.src='https://placehold.co/400x400/545859/FFD100?text=No+Image'" class="object-cover w-full h-full">
                        <div class="absolute top-2 left-2 bg-dark/80 text-highlight text-[10px] font-bold px-2 py-0.5 rounded shadow">
                            ${item.category || 'ทั่วไป'}
                        </div>
                    </div>
                    <div class="text-[10px] text-gray-400 font-mono">${item.itemId}</div>
                    <div class="font-bold text-dark leading-tight mb-2 flex-1 text-sm">${item.itemName}</div>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="text-xs bg-gray-100 border border-gray-200 text-primary px-2 py-1 rounded font-semibold">
                            เหลือ: ${item.stockQuantity} ${item.unit}
                        </span>
                    </div>
                    ${isOutOfStock ? 
                        `<button disabled class="mt-3 w-full bg-gray-300 text-gray-500 py-2 rounded-lg font-bold text-sm cursor-not-allowed">สินค้าหมด</button>` :
                        `<div class="mt-3 flex items-center justify-between bg-gray-50 rounded-lg p-1 border border-gray-200">
                            <button onclick="updateCart('${item.itemId}', -1)" class="w-8 h-8 rounded bg-white shadow flex items-center justify-center text-primary font-bold hover:bg-gray-100">-</button>
                            <input type="number" id="qty-${item.itemId}" value="${qtyInCart}" 
                                class="w-12 text-center font-bold bg-transparent outline-none border-none text-dark" 
                                onchange="manualUpdateCart('${item.itemId}', this.value, ${item.stockQuantity})"
                                onfocus="this.select()">
                            <button onclick="updateCart('${item.itemId}', 1, ${item.stockQuantity})" class="w-8 h-8 rounded bg-primary text-highlight shadow flex items-center justify-center font-bold hover:bg-opacity-90">+</button>
                        </div>`
                    }
                `;
                container.appendChild(card);
            });
        }

        function updateCart(itemId, change, maxStock = null) {
            let currentQty = cart[itemId] || 0;
            let newQty = currentQty + change;
            if (newQty < 0) newQty = 0;
            if (maxStock !== null && newQty > maxStock) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเบิกเกินจำนวนที่มีในคลังได้', 'warning');
                return;
            }
            if (newQty === 0) delete cart[itemId];
            else cart[itemId] = newQty;

            const qtyElement = document.getElementById(`qty-${itemId}`);
            if (qtyElement) qtyElement.value = newQty;
            updateCartSummary();
        }

        function manualUpdateCart(itemId, value, maxStock) {
            let newQty = parseInt(value, 10);
            if (isNaN(newQty) || newQty < 0) newQty = 0;
            if (newQty > maxStock) {
                Swal.fire('ข้อผิดพลาด', `สามารถเบิกได้สูงสุด ${maxStock} เท่านั้น`, 'warning');
                newQty = maxStock;
            }
            if (newQty === 0) delete cart[itemId];
            else cart[itemId] = newQty;

            const qtyElement = document.getElementById(`qty-${itemId}`);
            if (qtyElement) qtyElement.value = newQty;
            updateCartSummary();
        }

        function updateCartSummary() {
            const typesCount = Object.keys(cart).length;
            document.getElementById('cartCount').textContent = typesCount;
            const cartBar = document.getElementById('cartBar');
            if (typesCount > 0 && !document.getElementById('userView').classList.contains('hide')) {
                cartBar.classList.remove('hide');
            } else {
                cartBar.classList.add('hide');
            }
        }

        function showCartSummary() {
            if (Object.keys(cart).length === 0) return;
            let summaryHtml = '<div class="text-left max-h-60 overflow-y-auto divide-y">';
            let itemsToCheckout = [];
            for (let itemId in cart) {
                const item = inventoryItems.find(i => String(i.itemId) === String(itemId));
                if (item) {
                    summaryHtml += `
                        <div class="flex justify-between py-3 text-sm">
                            <span class="pr-2">${item.itemName}</span>
                            <span class="font-bold whitespace-nowrap text-primary">${cart[itemId]} ${item.unit}</span>
                        </div>`;
                    itemsToCheckout.push({ itemId: itemId, quantity: cart[itemId] });
                }
            }
            summaryHtml += '</div>';

            Swal.fire({
                title: 'ยืนยันการเบิกพัสดุ',
                html: summaryHtml,
                showCancelButton: true,
                confirmButtonColor: 'rgb(84, 88, 89)',
                cancelButtonColor: '#d33',
                confirmButtonText: 'ยืนยันการเบิก',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) processCheckout(itemsToCheckout);
            });
        }

        async function processCheckout(itemsData) {
            document.getElementById('loading').classList.remove('hide');
            const payload = { action: 'checkout', userId: currentUser.userId, cart: itemsData };
            
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const rawText = await response.text();
                let result;
                try { result = JSON.parse(rawText); } catch(e) { throw new Error("ระบบฝั่ง GAS ตอบกลับมาผิดรูปแบบ"); }
                
                document.getElementById('loading').classList.add('hide');
                if (result.status === 'success') {
                    cart = {};
                    updateCartSummary();
                    Swal.fire('สำเร็จ!', 'บันทึกการเบิกพัสดุเรียบร้อยแล้วระบบได้แจ้งเตือนไปที่ LINE ของคุณ', 'success').then(() => {
                        loadItems();
                    });
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', result.message, 'error');
                }
            } catch (error) {
                document.getElementById('loading').classList.add('hide');
                showError('ไม่สามารถเชื่อมต่อได้: ' + error.message);
            }
        }

        function toggleAdminMode() {
            const userView = document.getElementById('userView');
            const adminView = document.getElementById('adminView');
            const cartBar = document.getElementById('cartBar');

            if (userView.classList.contains('hide')) {
                adminView.classList.add('hide');
                userView.classList.remove('hide');
                updateCartSummary(); 
            } else {
                userView.classList.add('hide');
                cartBar.classList.add('hide');
                adminView.classList.remove('hide');
                fetchLowStock(); 
            }
        }

        async function handleAddStock(e) {
            e.preventDefault();
            const payload = {
                action: 'addStock',
                item: {
                    itemId: document.getElementById('add_itemId').value,
                    itemName: document.getElementById('add_itemName').value,
                    category: document.getElementById('add_category').value || 'ทั่วไป',
                    quantity: document.getElementById('add_qty').value,
                    minimumStock: document.getElementById('add_min').value || 5,
                    unit: document.getElementById('add_unit').value || 'ชิ้น',
                    adminId: currentUser.userId
                }
            };
            document.getElementById('loading').classList.remove('hide');
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                document.getElementById('loading').classList.add('hide');
                if (result.status === 'success') {
                    Swal.fire('สำเร็จ', 'บันทึกการนำเข้าพัสดุเรียบร้อย', 'success');
                    document.getElementById('addStockForm').reset();
                    document.getElementById('currentStockHint').classList.add('hide');
                    loadItems();
                } else {
                    Swal.fire('ผิดพลาด', result.message, 'error');
                }
            } catch (error) {
                document.getElementById('loading').classList.add('hide');
                showError('เชื่อมต่อระบบล้มเหลว');
            }
        }

        async function fetchLowStock() {
            const listDiv = document.getElementById('lowStockList');
            listDiv.innerHTML = '<p class="text-center text-sm text-gray-500">กำลังโหลด...</p>';
            try {
                const response = await fetch(`${GAS_URL}?action=getLowStock`);
                const result = await response.json();
                if (result.status === 'success' && result.data.length > 0) {
                    listDiv.innerHTML = result.data.map(item => `
                        <div class="flex justify-between border-b py-2 items-center cursor-pointer hover:bg-red-100 transition px-2 rounded -mx-2" 
                             onclick="fillStockFromLowStock('${item.itemId}')" title="คลิกเพื่อเติมข้อมูลพัสดุนี้">
                            <span class="font-bold text-sm">${item.itemName}</span>
                            <span class="text-xs bg-white text-red-600 px-2 py-1 rounded font-bold whitespace-nowrap ml-2 border border-red-200 shadow-sm">เหลือ ${item.stockQuantity}</span>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = '<p class="text-center text-sm text-green-600 mt-4">ไม่มีพัสดุใกล้หมด ✅</p>';
                }
            } catch (error) {
                listDiv.innerHTML = '<p class="text-red-500 text-sm">โหลดข้อมูลไม่สำเร็จ</p>';
            }
        }

        function renderReportTable() {
            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = inventoryItems.map(item => {
                const statusHtml = item.stockQuantity <= item.minimumStock 
                    ? `<span class="text-red-500 font-bold">ใกล้หมด</span>` 
                    : `<span class="text-green-600">ปกติ</span>`;
                return `
                <tr class="border-b border-gray-200">
                    <td class="p-2 text-sm font-mono text-gray-500">${item.itemId}</td>
                    <td class="p-2 text-sm">${item.category || 'ทั่วไป'}</td>
                    <td class="p-2 text-sm font-bold">${item.itemName}</td>
                    <td class="p-2 text-center text-sm font-bold">${item.stockQuantity}</td>
                    <td class="p-2 text-center text-sm">${statusHtml}</td>
                </tr>
            `}).join('');
        }

        function exportReportToPDF() {
            const element = document.getElementById('reportContainer');
            element.parentElement.classList.remove('hide');
            const opt = {
                margin:       10,
                filename:     `Inventory_Report_${new Date().toISOString().split('T')[0]}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => {
                element.parentElement.classList.add('hide');
            });
        }

        function showError(msg) {
            Swal.fire({ icon: 'error', title: 'แจ้งเตือน', text: msg, confirmButtonColor: '#545859' });
        }
    </script>
</body>
</html>
