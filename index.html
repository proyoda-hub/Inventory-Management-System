<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเบิกพัสดุ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(84, 88, 89)',
                        highlight: 'rgb(255, 209, 0)',
                        dark: 'rgb(16, 24, 32)'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .hide { display: none !important; }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .swal-image-modal { padding: 1em !important; border-radius: 1.5rem !important; }

        /* 🌟 CSS พิเศษสำหรับจัดรูปแบบตอนเซฟเป็น PDF (Print Mode) */
        @media print {
            body { background-color: white !important; }
            nav, #loading, #userView, #cartBar, footer { display: none !important; }
            #adminView > .flex, #adminTabMenu { display: none !important; }
            
            /* บังคับซ่อนแท็บอื่น เปิดแค่ Report */
            #adminTabDashboard, #adminTabUsers { display: none !important; }
            #adminTabReport { display: block !important; margin: 0 !important; padding: 0 !important; }
            
            #adminTabReport > .bg-white { padding: 0 !important; margin: 0 !important; box-shadow: none !important; }
            #adminTabReport > .bg-white > h3, #adminTabReport > .bg-white > .grid { display: none !important; }
            #reportPreviewContainer button { display: none !important; }
            
            #adminView { padding: 0 !important; max-width: 100% !important; }
            .overflow-x-auto { overflow: visible !important; border: none !important; background: transparent !important; padding: 0 !important; box-shadow: none !important; }
            #reportPreviewContainer { display: block !important; width: 100% !important; margin: 0 !important; }
            #reportPaper { width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { margin: 15mm; size: A4 portrait; }
        }
    </style>
</head>
<body class="text-dark bg-gray-100 min-h-screen pb-20">

    <input type="file" id="imageUploader" accept="image/*" class="hide" onchange="processImageSelection(event)">

    <nav class="bg-dark text-highlight p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div class="font-bold text-lg flex items-center gap-2">
            📦 ระบบเบิกพัสดุ
        </div>
        <div id="userInfo" class="flex items-center gap-2 hide">
            <span id="userName" class="text-sm font-semibold text-white"></span>
            <img id="userImg" src="" class="w-8 h-8 rounded-full border border-highlight object-cover">
            <button id="adminBtn" onclick="toggleAdminMode()" class="hide ml-2 bg-primary text-white text-xs px-2 py-1 rounded shadow">Admin</button>
        </div>
    </nav>

    <div id="loading" class="fixed inset-0 bg-dark/80 flex flex-col justify-center items-center z-[100] text-highlight hide">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-highlight mb-4"></div>
        <p id="loadingText" class="font-bold">กำลังโหลดข้อมูล...</p>
    </div>

    <main id="userView" class="p-4 max-w-4xl mx-auto hide">
        <div class="flex justify-between items-end mb-4 border-b-2 border-highlight pb-1">
            <h2 class="text-xl font-bold text-primary">รายการพัสดุ</h2>
        </div>

        <div class="mb-5 space-y-3 sticky top-[60px] z-40 bg-gray-100 pt-2 pb-2">
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="handleSearch(this.value)" placeholder="ค้นหาชื่อ หรือ รหัสพัสดุ..." 
                    class="w-full pl-10 pr-4 py-2.5 border-none rounded-xl bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-highlight text-sm font-semibold">
                <span class="absolute left-3 top-2.5 text-xl">🔍</span>
            </div>
            <div id="categoryTabs" class="flex overflow-x-auto gap-2 pb-1 scrollbar-hide snap-x"></div>
        </div>

        <div id="itemList" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </main>

    <div id="cartBar" class="fixed bottom-0 left-0 w-full bg-primary text-white p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] flex justify-between items-center z-40 rounded-t-2xl hide">
        <div>
            <span class="text-sm">เลือกแล้ว:</span>
            <span id="cartCount" class="font-bold text-highlight text-lg ml-1">0</span> รายการ
        </div>
        <button onclick="showCartSummary()" class="bg-highlight text-dark font-bold px-6 py-2 rounded-full hover:bg-yellow-400 transition transform hover:scale-105 shadow-lg">
            ยืนยันการเบิก
        </button>
    </div>

    <main id="adminView" class="hide p-4 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-primary border-b-2 border-highlight inline-block pb-1">โหมดผู้ดูแลระบบ</h2>
            <button onclick="toggleAdminMode()" class="bg-gray-200 text-dark px-4 py-1.5 rounded-lg font-bold shadow hover:bg-gray-300 transition">กลับหน้าแรก</button>
        </div>

        <div id="adminTabMenu" class="flex space-x-2 mb-6 border-b-2 border-gray-200 overflow-x-auto scrollbar-hide">
            <button onclick="switchAdminTab('dashboard')" id="btnTabDashboard" class="admin-tab-btn active px-4 py-3 font-bold text-sm border-b-4 border-highlight text-dark transition whitespace-nowrap">
                📊 Dashboard & นำเข้า
            </button>
            <button onclick="switchAdminTab('report')" id="btnTabReport" class="admin-tab-btn px-4 py-3 font-bold text-sm border-b-4 border-transparent text-gray-500 hover:text-dark transition whitespace-nowrap">
                📑 ระบบรายงาน
            </button>
            <button onclick="switchAdminTab('users')" id="btnTabUsers" class="admin-tab-btn px-4 py-3 font-bold text-sm border-b-4 border-transparent text-gray-500 hover:text-dark transition whitespace-nowrap">
                👥 จัดการผู้ใช้
            </button>
        </div>

        <div id="adminTabDashboard" class="admin-tab-content block">
            <div class="bg-white p-5 rounded-2xl shadow mb-6">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 border-b border-gray-200 pb-3 gap-3">
                    <h3 class="font-bold text-lg text-dark flex items-center gap-2">📈 ภาพรวมคลังพัสดุ</h3>
                    <div class="flex items-center gap-2 w-full md:w-auto">
                        <label class="text-sm text-gray-500 font-bold whitespace-nowrap">ตัวกรอง:</label>
                        <select id="dashCategoryFilter" onchange="renderDashboard(this.value)" class="w-full md:w-auto border border-gray-300 p-1.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-highlight text-sm font-semibold bg-gray-50">
                            <option value="all">ทุกหมวดหมู่</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 flex flex-col justify-center items-center shadow-sm">
                        <span class="text-blue-600 text-xs font-bold uppercase tracking-wider mb-1">รายการพัสดุทั้งหมด</span>
                        <span id="kpiTotalItems" class="text-3xl font-black text-blue-800">0</span>
                    </div>
                    <div class="bg-green-50 p-4 rounded-xl border border-green-100 flex flex-col justify-center items-center shadow-sm">
                        <span class="text-green-600 text-xs font-bold uppercase tracking-wider mb-1">จำนวนคงเหลือรวม</span>
                        <span id="kpiTotalStock" class="text-3xl font-black text-green-800">0</span>
                    </div>
                    <div class="bg-red-50 p-4 rounded-xl border border-red-100 flex flex-col justify-center items-center shadow-sm">
                        <span class="text-red-600 text-xs font-bold uppercase tracking-wider mb-1">พัสดุใกล้หมด</span>
                        <span id="kpiLowStock" class="text-3xl font-black text-red-800">0</span>
                    </div>
                    <div class="bg-purple-50 p-4 rounded-xl border border-purple-100 flex flex-col justify-center items-center shadow-sm">
                        <span class="text-purple-600 text-xs font-bold uppercase tracking-wider mb-1">หมวดหมู่ทั้งหมด</span>
                        <span id="kpiCategories" class="text-3xl font-black text-purple-800">0</span>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div class="border border-gray-200 rounded-xl p-4 shadow-sm bg-gray-50">
                        <div class="h-[280px] relative"><canvas id="barChart"></canvas></div>
                    </div>
                    <div class="border border-gray-200 rounded-xl p-4 shadow-sm bg-gray-50">
                        <div class="h-[280px] relative flex justify-center"><canvas id="pieChart"></canvas></div>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div class="border border-gray-200 rounded-xl p-4 shadow-sm bg-gray-50">
                        <div class="h-[280px] relative"><canvas id="lineChart"></canvas></div>
                    </div>
                    <div class="border border-gray-200 rounded-xl p-4 shadow-sm bg-gray-50">
                        <div class="h-[280px] relative"><canvas id="userChart"></canvas></div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
